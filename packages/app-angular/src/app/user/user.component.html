@if (isLoading()) {
  <p>Loading...</p>
} @else if (error()) {
  <p>{{ error() }}</p>
} @else {
  @if (user()) {
    <div class="user-card">
      <h2>{{ user()!.fullName }}</h2>
      <p>{{ user()!.email }}</p>
      <small>{{ user()!.displayLabel }}</small>
    </div>
  }

  <ul>
    @for (u of users(); track u.id) {
      <li>{{ u.displayLabel }}</li>
    }
  </ul>
}

<button (click)="loadAll()">Refresh</button>
