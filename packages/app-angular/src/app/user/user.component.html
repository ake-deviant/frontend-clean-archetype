<div class="user-card">
  @if (isLoading()) {
    <p>Loading...</p>
  } @else if (error()) {
    <p>{{ error() }}</p>
  } @else if (user()) {
    <h2>{{ user()!.fullName }}</h2>
    <p>{{ user()!.email }}</p>
    <small>{{ user()!.displayLabel }}</small>
  } @else {
    <p>No user found.</p>
  }
</div>
