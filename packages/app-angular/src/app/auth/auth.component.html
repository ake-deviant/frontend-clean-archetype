<div class="auth-bar">
  @if (currentUser()) {
    <span class="auth-user">{{ currentUser()!.displayLabel }}</span>
    <button class="btn-secondary" (click)="logout()">Se déconnecter</button>
  } @else {
    <button (click)="openModal()">Se connecter</button>
  }
</div>

@if (showModal()) {
  <app-login-modal (loggedIn)="onLoggedIn($event)" (closed)="showModal.set(false)" />
}
